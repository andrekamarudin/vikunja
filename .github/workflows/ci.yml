name: ci

env:
  DO_NOT_TRACK: 1

on:
  pull_request:
    paths-ignore:
      - '.github/workflows/deploy.yml'
      - '.github/workflows/sync-upstream.yml'
      - '**/*.md'
  merge_group:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/deploy.yml'
      - '.github/workflows/sync-upstream.yml'
      - '**/*.md'

concurrency:
  # main merges use a unique run_id so they don't cancel each other
  # other branches or PRs share a group to auto-cancel old runs
  group: ${{ github.ref == 'refs/heads/main' &&
    format('{0}-{1}', github.workflow, github.run_id) ||
    format('{0}-{1}', github.workflow, github.event.pull_request.number || github.ref) }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml
    secrets: inherit

  notify:
    if: ${{ always() }}
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Send ntfy notification
        env:
          JOB_RESULTS: ${{ toJson(needs) }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          NTFY_TOPIC_URL: https://ntfy.bytesizeprotip.com/deploy
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$NTFY_TOKEN" ]; then
            echo "NTFY_TOKEN secret not configured, skipping notification."
            exit 0
          fi

          eval "$(python3 - <<'PY'
          import json
          import os
          import shlex

          needs = json.loads(os.environ["JOB_RESULTS"])
          results = {name: str(data.get("result") or "unknown") for name, data in needs.items()}
          has_failure = any(result == "failure" for result in results.values())
          has_cancelled = any(result == "cancelled" for result in results.values())

          if has_failure:
            status = "failure"
            priority = "5"
            tags = "rotating_light,x"
          elif has_cancelled:
            status = "cancelled"
            priority = "4"
            tags = "warning"
          else:
            status = "success"
            priority = "2"
            tags = "white_check_mark"

          summary = ", ".join(f"{name}:{result}" for name, result in results.items()) or "no upstream jobs"
          message = "\n".join([
            f"Repo: {os.environ['GITHUB_REPOSITORY']}",
            f"Workflow: {os.environ['GITHUB_WORKFLOW']}",
            f"Status: {status}",
            f"Ref: {os.environ.get('GITHUB_REF_NAME', '')}",
            f"Actor: {os.environ.get('GITHUB_ACTOR', '')}",
            f"Run: {os.environ['RUN_URL']}",
            f"Jobs: {summary}",
          ])

          values = {
            "NTFY_TITLE": f"{os.environ['GITHUB_WORKFLOW']} {status}",
            "NTFY_PRIORITY": priority,
            "NTFY_TAGS": tags,
            "NTFY_MESSAGE": message,
          }

          for key, value in values.items():
            print(f"{key}={shlex.quote(value)}")
          PY
          )"

          curl --fail --show-error --silent \
            -H "Authorization: Bearer $NTFY_TOKEN" \
            -H "Title: $NTFY_TITLE" \
            -H "Priority: $NTFY_PRIORITY" \
            -H "Tags: $NTFY_TAGS" \
            -H "Click: $RUN_URL" \
            -d "$NTFY_MESSAGE" \
            "$NTFY_TOPIC_URL"
