name: Sync upstream

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout fork
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0
      - name: Merge upstream (excluding workflows)
        run: |
          git remote add upstream https://github.com/go-vikunja/vikunja.git || true
          git fetch upstream main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Merge but keep our workflow files
          git merge upstream/main --no-commit --no-ff || true
          git checkout HEAD -- .github/workflows/ 2>/dev/null || true
          if git diff --cached --quiet && git diff --quiet; then
            echo "Already up to date."
          else
            git commit -m "chore: sync with upstream go-vikunja/vikunja"
          fi
      - name: Push changes
        run: git push origin main

  notify:
    if: ${{ always() }}
    needs: [sync]
    runs-on: ubuntu-latest
    steps:
      - name: Send ntfy notification
        env:
          JOB_RESULTS: ${{ toJson(needs) }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          NTFY_TOPIC_URL: https://ntfy.bytesizeprotip.com/deploy
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$NTFY_TOKEN" ]; then
            echo "NTFY_TOKEN secret not configured, skipping notification."
            exit 0
          fi

          eval "$(python3 - <<'PY'
          import json
          import os
          import shlex

          needs = json.loads(os.environ["JOB_RESULTS"])
          results = {name: str(data.get("result") or "unknown") for name, data in needs.items()}
          has_failure = any(result == "failure" for result in results.values())
          has_cancelled = any(result == "cancelled" for result in results.values())

          if has_failure:
            status = "failure"
            priority = "5"
            tags = "rotating_light,x"
          elif has_cancelled:
            status = "cancelled"
            priority = "4"
            tags = "warning"
          else:
            status = "success"
            priority = "2"
            tags = "white_check_mark"

          summary = ", ".join(f"{name}:{result}" for name, result in results.items()) or "no upstream jobs"
          message = "\n".join([
            f"Repo: {os.environ['GITHUB_REPOSITORY']}",
            f"Workflow: {os.environ['GITHUB_WORKFLOW']}",
            f"Status: {status}",
            f"Ref: {os.environ.get('GITHUB_REF_NAME', '')}",
            f"Actor: {os.environ.get('GITHUB_ACTOR', '')}",
            f"Run: {os.environ['RUN_URL']}",
            f"Jobs: {summary}",
          ])

          values = {
            "NTFY_TITLE": f"{os.environ['GITHUB_WORKFLOW']} {status}",
            "NTFY_PRIORITY": priority,
            "NTFY_TAGS": tags,
            "NTFY_MESSAGE": message,
          }

          for key, value in values.items():
            print(f"{key}={shlex.quote(value)}")
          PY
          )"

          curl --fail --show-error --silent \
            -H "Authorization: Bearer $NTFY_TOKEN" \
            -H "Title: $NTFY_TITLE" \
            -H "Priority: $NTFY_PRIORITY" \
            -H "Tags: $NTFY_TAGS" \
            -H "Click: $RUN_URL" \
            -d "$NTFY_MESSAGE" \
            "$NTFY_TOPIC_URL"
